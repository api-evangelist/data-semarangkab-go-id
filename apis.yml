aid: data-semarangkab-go-id
name: Satu Data Semarang Regency
description: >-
  Satu Data Semarang Regency is a regional government open-data portal for Indonesia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 467 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
