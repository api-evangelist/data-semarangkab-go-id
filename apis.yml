    name: Satu Data Semarang Regency CKAN Action API
    description: >-
      CKAN Action API for Satu Data Semarang Regency, a consistent JSON-over-HTTP interface over a catalog of 467 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.semarangkab.go.id/ckan/api/3/action/.
